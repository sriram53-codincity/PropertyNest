name: CI Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: homelease_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio httpx
        
    - name: Run Tests
      env:
        SECRET_KEY: this-is-a-test-secret-key-that-is-long-enough-for-jwt
        MONGO_URL: mongodb://localhost:27017/homelease_test
        MONGO_DB: homelease_test
        PG_HOST: localhost
        PG_PORT: 5432
        PG_DATABASE: homelease_test
        PG_USER: postgres
        PG_PASSWORD: password
      run: |
        pytest tests/
